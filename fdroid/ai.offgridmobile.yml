Builds:
  - versionName: 0.0.48
    versionCode: 1771162340
    commit: v0.0.48
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y npm
    init: npm install
    gradle:
      - fdroid
    rm:
      - ios
    scanignore:
      - android/app/src/main/jniLibs/arm64-v8a/libstable_diffusion_core.so
      - android/app/src/main/assets/ggml-hexagon/*.so
      - android/app/src/main/assets/qnnlibs/*.so
      - node_modules/llama.rn/android/src/main/jniLibs/*/*.so
      - node_modules/llama.rn/bin/arm64-v8a/*.so
      - node_modules/whisper.rn/android/src/main/jniLibs/*/*.so
      - node_modules/hermes-compiler/hermesc/linux64-bin/hermesc
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
      - node_modules/react-native-vector-icons/android/build.gradle
      - node_modules/react-native-linear-gradient/android/build.gradle
      - node_modules/react-native-image-picker/android/build.gradle
      - node_modules/react-native-device-info/android/build.gradle
      - node_modules/react-native-haptic-feedback/android/build.gradle
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/@react-native-community/blur/android/build.gradle
      - node_modules/lottie-react-native/android/build.gradle
    scandelete:
      - node_modules/
    ndk: 27.1.12297006

MaintainerNotes: |
  scanignore is used to allow the React Native local Maven repository
  and native Android build.gradle files from React Native dependencies.
  Pre-built .so files include Qualcomm QNN/Hexagon NPU acceleration
  libraries, llama.rn and whisper.rn inference engines, and Stable
  Diffusion core — all required for on-device AI inference.
  All other dependencies are FOSS. No Google Play Services, Firebase,
  analytics, or tracking.

